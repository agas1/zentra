services:
  postgres:
    image: postgres:15-alpine
    container_name: opera-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: opera
      POSTGRES_USER: opera
      POSTGRES_PASSWORD: opera_secret
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: opera-redis
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
